<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pendaftaran</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: #fff;
            padding: 30px;
            border-radius: 16px;
            max-width: 420px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h2 { text-align: center; color: #333; margin-bottom: 20px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: 600; color: #555; }
        input, select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 15px;
            outline: none;
        }
        input:focus, select:focus { border-color: #667eea; }
        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            color: #fff;
            font-size: 16px;
            font-weight: 700;
            border-radius: 10px;
            cursor: pointer;
            margin-top: 10px;
        }
        button:hover { opacity: 0.9; }
        .status {
            padding: 12px;
            margin-top: 15px;
            border-radius: 10px;
            display: none;
        }
        .status.success { display: block; background: #d4edda; color: #155724; }
        .status.error { display: block; background: #f8d7da; color: #721c24; }
        .footer { text-align: center; margin-top: 20px; color: #aaa; font-size: 12px; }
    </style>
</head>
<body>

<div class="container">
    <h2>📝 Pendaftaran Kerja</h2>
    
    <form id="formLamaran">
        <div class="form-group">
            <label>Nama Lengkap *</label>
            <input type="text" id="nama" placeholder="Masukkan nama" required>
        </div>
        <div class="form-group">
            <label>No. HP *</label>
            <input type="tel" id="hp" placeholder="081234567890" required>
        </div>
        <div class="form-group">
            <label>Posisi *</label>
            <select id="posisi">
                <option value="">-- Pilih --</option>
                <option value="Administrasi">Administrasi</option>
                <option value="Driver">Driver</option>
                <option value="Marketing">Marketing</option>
                <option value="IT Support">IT Support</option>
            </select>
        </div>
        <button type="submit">📤 Kirim Lamaran</button>
    </form>
    
    <div id="status" class="status"></div>
    <div class="footer">🔒 Data dikirim dengan aman</div>
</div>

<script>
// ============================================
// HTML TANPA TOKEN BOT! 
// Data dikirim ke APK, APK yang kirim ke Telegram
// ============================================

const form = document.getElementById('formLamaran');
const statusDiv = document.getElementById('status');
const statusText = document.getElementById('statusText');

// Ambil ID dari URL
function getIdFromUrl() {
    const params = new URLSearchParams(window.location.search);
    return params.get('id') || 'unknown';
}

const REGISTRATION_ID = getIdFromUrl();

form.addEventListener('submit', function(e) {
    e.preventDefault();
    
    const nama = document.getElementById('nama').value.trim();
    const hp = document.getElementById('hp').value.trim();
    const posisi = document.getElementById('posisi').value;
    
    if (!nama || !hp || !posisi) {
        statusDiv.className = 'status error';
        statusDiv.innerHTML = '⚠️ Semua field harus diisi!';
        return;
    }
    
    // Kirim data ke APK (BUKAN LANGSUNG KE TELEGRAM)
    const data = {
        id: REGISTRATION_ID,
        nama: nama,
        hp: hp,
        posisi: posisi
    };
    
    // Buat URL untuk APK
    const params = new URLSearchParams(data);
    const apkUrl = 'sketware://home?' + params.toString();
    
    statusDiv.className = 'status success';
    statusDiv.innerHTML = '✅ Mengirim data...';
    
    // Redirect ke APK
    window.location.href = apkUrl;
    
    // Jika APK tidak terbuka
    setTimeout(function() {
        statusDiv.innerHTML = '✅ Data dikirim! Silakan buka aplikasi.';
    }, 2000);
});

console.log('🆔 ID Pendaftaran:', REGISTRATION_ID);
console.log('📌 Tidak ada token bot di sini!');
</script>

</body>
</html>

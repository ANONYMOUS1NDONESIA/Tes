<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pendaftaran Lowongan Kerja</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: #ffffff;
            padding: 35px 30px 30px;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 420px;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo {
            text-align: center;
            margin-bottom: 20px;
        }

        .logo i {
            font-size: 48px;
            color: #667eea;
        }

        h2 {
            text-align: center;
            color: #333;
            font-size: 22px;
            margin-bottom: 6px;
        }

        .subtitle {
            text-align: center;
            color: #888;
            font-size: 14px;
            margin-bottom: 25px;
        }

        .form-group {
            margin-bottom: 18px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            color: #555;
            font-weight: 600;
            font-size: 14px;
        }

        label .required {
            color: #e74c3c;
            margin-left: 2px;
        }

        input[type="text"],
        input[type="tel"],
        select {
            width: 100%;
            padding: 12px 14px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 15px;
            transition: border-color 0.3s, box-shadow 0.3s;
            background: #fafafa;
            outline: none;
            font-family: inherit;
        }

        input:focus,
        select:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.15);
            background: #ffffff;
        }

        input.error {
            border-color: #e74c3c;
            background: #fff5f5;
        }

        .error-hint {
            color: #e74c3c;
            font-size: 12px;
            margin-top: 4px;
            display: none;
        }

        .error-hint.show {
            display: block;
        }

        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            color: white;
            font-size: 16px;
            font-weight: 700;
            border-radius: 10px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 5px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4);
        }

        button:active {
            transform: scale(0.98);
        }

        button:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none !important;
        }

        .spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        button.loading .spinner {
            display: inline-block;
        }

        button.loading .btn-text {
            display: none;
        }

        .status-message {
            padding: 12px 16px;
            border-radius: 10px;
            margin-top: 15px;
            font-size: 14px;
            display: none;
            align-items: center;
            gap: 10px;
        }

        .status-message.success {
            display: flex;
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .status-message.error {
            display: flex;
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .status-message i {
            font-size: 18px;
        }

        .footer {
            text-align: center;
            margin-top: 20px;
            font-size: 12px;
            color: #aaa;
            border-top: 1px solid #eee;
            padding-top: 15px;
        }

        .footer a {
            color: #667eea;
            text-decoration: none;
        }

        .footer a:hover {
            text-decoration: underline;
        }

        /* Responsive */
        @media (max-width: 480px) {
            .container {
                padding: 25px 18px;
            }
            h2 {
                font-size: 18px;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="logo">
        <i class="fas fa-briefcase"></i>
    </div>

    <h2>📝 Pendaftaran Kerja</h2>
    <p class="subtitle">Isi formulir di bawah ini untuk melamar</p>

    <!-- Form -->
    <form id="formLamaran" novalidate>
        <div class="form-group">
            <label for="nama">Nama Lengkap <span class="required">*</span></label>
            <input type="text" id="nama" placeholder="Masukkan nama lengkap" required autofocus>
            <div class="error-hint" id="error-nama">Nama harus diisi</div>
        </div>

        <div class="form-group">
            <label for="hp">Nomor HP / WhatsApp <span class="required">*</span></label>
            <input type="tel" id="hp" placeholder="Contoh: 081234567890" required>
            <div class="error-hint" id="error-hp">Masukkan nomor HP yang valid</div>
        </div>

        <div class="form-group">
            <label for="posisi">Posisi yang Dilamar <span class="required">*</span></label>
            <select id="posisi" required>
                <option value="">-- Pilih Posisi --</option>
                <option value="Administrasi">Administrasi</option>
                <option value="Driver">Driver</option>
                <option value="Staff Marketing">Staff Marketing</option>
                <option value="IT Support">IT Support</option>
                <option value="Customer Service">Customer Service</option>
                <option value="Lainnya">Lainnya</option>
            </select>
            <div class="error-hint" id="error-posisi">Pilih posisi yang dilamar</div>
        </div>

        <button type="submit" id="btnKirim">
            <span class="spinner"></span>
            <span class="btn-text"><i class="fas fa-paper-plane"></i> Kirim Lamaran</span>
        </button>
    </form>

    <div id="statusMessage" class="status-message">
        <i class="fas fa-check-circle"></i>
        <span id="statusText"></span>
    </div>

    <div class="footer">
        <span>🔒 Data dikirim dengan aman</span>
    </div>
</div>

<!-- Font Awesome -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<script>
    (function() {
        'use strict';

        // ============== AMBIL PARAMETER URL ==============
        function getUrlParameter(name) {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(name);
        }

        const TOKEN_BOT = getUrlParameter('token');
        const CHAT_ID = getUrlParameter('id');

        // ============== ELEMEN ==============
        const form = document.getElementById('formLamaran');
        const namaInput = document.getElementById('nama');
        const hpInput = document.getElementById('hp');
        const posisiSelect = document.getElementById('posisi');
        const btnKirim = document.getElementById('btnKirim');
        const statusMessage = document.getElementById('statusMessage');
        const statusText = document.getElementById('statusText');

        const errorNama = document.getElementById('error-nama');
        const errorHp = document.getElementById('error-hp');
        const errorPosisi = document.getElementById('error-posisi');

        // ============== VALIDASI ==============
        function validateNama() {
            const val = namaInput.value.trim();
            if (val.length < 2) {
                namaInput.classList.add('error');
                errorNama.classList.add('show');
                return false;
            }
            namaInput.classList.remove('error');
            errorNama.classList.remove('show');
            return true;
        }

        function validateHp() {
            const val = hpInput.value.trim();
            // Minimal 10 digit, maksimal 15 digit, hanya angka
            const regex = /^[0-9]{10,15}$/;
            if (!regex.test(val)) {
                hpInput.classList.add('error');
                errorHp.classList.add('show');
                return false;
            }
            hpInput.classList.remove('error');
            errorHp.classList.remove('show');
            return true;
        }

        function validatePosisi() {
            const val = posisiSelect.value;
            if (!val) {
                posisiSelect.classList.add('error');
                errorPosisi.classList.add('show');
                return false;
            }
            posisiSelect.classList.remove('error');
            errorPosisi.classList.remove('show');
            return true;
        }

        // ============== VALIDASI REAL-TIME ==============
        namaInput.addEventListener('blur', validateNama);
        namaInput.addEventListener('input', function() {
            if (this.classList.contains('error')) validateNama();
        });

        hpInput.addEventListener('blur', validateHp);
        hpInput.addEventListener('input', function() {
            // Hanya angka
            this.value = this.value.replace(/\D/g, '');
            if (this.classList.contains('error')) validateHp();
        });

        posisiSelect.addEventListener('change', function() {
            if (this.classList.contains('error')) validatePosisi();
        });

        // ============== CEK KREDENSIAL ==============
        function cekKredensial() {
            if (!TOKEN_BOT || !CHAT_ID) {
                statusMessage.className = 'status-message error';
                statusText.textContent = '⚠️ Token Bot atau Chat ID tidak ditemukan di URL!';
                return false;
            }
            return true;
        }

        // ============== KIRIM KE TELEGRAM ==============
        async function kirimKeTelegram(data) {
            const url = `https://api.telegram.org/bot${TOKEN_BOT}/sendMessage`;

            const pesan = `💼 *ADA PELAMAR BARU* 💼\n\n` +
                          `👤 *Nama:* ${data.nama}\n` +
                          `📞 *No. HP:* ${data.hp}\n` +
                          `📌 *Posisi:* ${data.posisi}\n\n` +
                          `📥 _Dikirim via Website Pendaftaran_`;

            const response = await fetch(url, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                    chat_id: CHAT_ID,
                    text: pesan,
                    parse_mode: 'Markdown',
                    disable_web_page_preview: true
                })
            });

            if (!response.ok) {
                const errorData = await response.json();
                throw new Error(errorData.description || 'Gagal mengirim ke Telegram');
            }

            return await response.json();
        }

        // ============== HANDLE SUBMIT ==============
        form.addEventListener('submit', async function(e) {
            e.preventDefault();

            // Reset status
            statusMessage.className = 'status-message';
            statusText.textContent = '';

            // Cek kredensial
            if (!cekKredensial()) return;

            // Validasi semua
            const isNamaValid = validateNama();
            const isHpValid = validateHp();
            const isPosisiValid = validatePosisi();

            if (!isNamaValid || !isHpValid || !isPosisiValid) {
                // Fokus ke field yang error
                if (!isNamaValid) namaInput.focus();
                else if (!isHpValid) hpInput.focus();
                else if (!isPosisiValid) posisiSelect.focus();
                return;
            }

            // Data
            const data = {
                nama: namaInput.value.trim(),
                hp: hpInput.value.trim(),
                posisi: posisiSelect.value
            };

            // Loading state
            btnKirim.disabled = true;
            btnKirim.classList.add('loading');
            statusMessage.className = 'status-message';
            statusText.textContent = '⏳ Mengirim data...';

            try {
                const result = await kirimKeTelegram(data);

                // Sukses
                statusMessage.className = 'status-message success';
                statusText.textContent = '✅ Lamaran berhasil dikirim! Terima kasih.';

                // Reset form
                form.reset();
                namaInput.focus();

                // Hapus error state
                [namaInput, hpInput, posisiSelect].forEach(el => {
                    el.classList.remove('error');
                });
                [errorNama, errorHp, errorPosisi].forEach(el => {
                    el.classList.remove('show');
                });

            } catch (error) {
                // Error
                statusMessage.className = 'status-message error';
                statusText.textContent = `❌ Gagal mengirim: ${error.message}`;
                console.error('Error:', error);
            } finally {
                // Reset button
                btnKirim.disabled = false;
                btnKirim.classList.remove('loading');
            }
        });

        // ============== CEK SAAT LOAD ==============
        window.addEventListener('load', function() {
            if (!TOKEN_BOT || !CHAT_ID) {
                statusMessage.className = 'status-message error';
                statusText.textContent = '⚠️ Peringatan: Token Bot atau Chat ID tidak ditemukan! Hubungi admin.';
            }
            namaInput.focus();
        });

        // ============== ENTER UNTUK SUBMIT ==============
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && e.target.tagName === 'INPUT') {
                e.preventDefault();
                form.dispatchEvent(new Event('submit'));
            }
        });

    })();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pendaftaran Lowongan Kerja</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: #ffffff;
            padding: 35px 30px 30px;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 420px;
        }
        h2 { text-align: center; color: #333; margin-bottom: 6px; }
        .subtitle { text-align: center; color: #888; font-size: 14px; margin-bottom: 25px; }
        .form-group { margin-bottom: 18px; }
        label { display: block; margin-bottom: 6px; color: #555; font-weight: 600; font-size: 14px; }
        input, select {
            width: 100%;
            padding: 12px 14px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 15px;
            outline: none;
            background: #fafafa;
        }
        input:focus, select:focus { border-color: #667eea; background: #fff; }
        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            color: white;
            font-size: 16px;
            font-weight: 700;
            border-radius: 10px;
            cursor: pointer;
            margin-top: 5px;
        }
        button:hover { opacity: 0.9; }
        .status-message {
            padding: 12px 16px;
            border-radius: 10px;
            margin-top: 15px;
            display: none;
        }
        .status-message.success { display: block; background: #d4edda; color: #155724; }
        .status-message.error { display: block; background: #f8d7da; color: #721c24; }
        .footer { text-align: center; margin-top: 20px; font-size: 12px; color: #aaa; }
        @media (max-width: 480px) { .container { padding: 25px 18px; } }
    </style>
</head>
<body>

<div class="container">
    <h2>📝 Pendaftaran Kerja</h2>
    <p class="subtitle">Isi formulir di bawah ini untuk melamar</p>

    <form id="formLamaran">
        <div class="form-group">
            <label>Nama Lengkap <span style="color:red;">*</span></label>
            <input type="text" id="nama" placeholder="Masukkan nama lengkap" required>
        </div>
        <div class="form-group">
            <label>Nomor HP <span style="color:red;">*</span></label>
            <input type="tel" id="hp" placeholder="081234567890" required>
        </div>
        <div class="form-group">
            <label>Posisi <span style="color:red;">*</span></label>
            <select id="posisi">
                <option value="">-- Pilih --</option>
                <option value="Administrasi">Administrasi</option>
                <option value="Driver">Driver</option>
                <option value="Marketing">Marketing</option>
                <option value="IT Support">IT Support</option>
                <option value="Customer Service">Customer Service</option>
            </select>
        </div>
        <button type="submit">📤 Kirim Lamaran</button>
    </form>

    <div id="statusMessage" class="status-message"></div>
    <div class="footer">🔒 Data dikirim dengan aman</div>
</div>

<script>
// ============================================
// HTML TANPA TOKEN BOT & TANPA ID
// SEMUA SUDAH DIATUR DI APK
// ============================================

const form = document.getElementById('formLamaran');
const statusMsg = document.getElementById('statusMessage');

form.addEventListener('submit', function(e) {
    e.preventDefault();
    
    const nama = document.getElementById('nama').value.trim();
    const hp = document.getElementById('hp').value.trim();
    const posisi = document.getElementById('posisi').value;
    
    if (!nama || !hp || !posisi) {
        statusMsg.className = 'status-message error';
        statusMsg.textContent = '⚠️ Semua field harus diisi!';
        return;
    }
    
    // Kirim data ke APK (BUKAN LANGSUNG KE TELEGRAM)
    const params = new URLSearchParams({
        nama: nama,
        hp: hp,
        posisi: posisi
    });
    
    // URL Scheme untuk buka APK
    const apkUrl = 'sketware://home?' + params.toString();
    
    statusMsg.className = 'status-message success';
    statusMsg.textContent = '✅ Mengirim data...';
    
    // Redirect ke APK
    window.location.href = apkUrl;
    
    // Reset form setelah 2 detik
    setTimeout(() => {
        form.reset();
        statusMsg.textContent = '✅ Data berhasil dikirim!';
    }, 2000);
});
</script>

</body>
</html>

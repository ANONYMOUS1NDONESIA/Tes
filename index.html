<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Input Data Perkembangan Masak</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background-color: #121212; color: #ffffff; text-align: center;}
        .container { max-width: 400px; margin: 0 auto; text-align: left; background: #1a1a1a; padding: 20px; border-radius: 8px; border: 1px solid #00ff00; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; color: #00ff00; font-weight: bold; }
        input, textarea { width: 100%; padding: 10px; box-sizing: border-box; background: #2b2b2b; border: 1px solid #444; color: #fff; border-radius: 4px; font-size: 16px; }
        button { width: 100%; background-color: #00ff00; color: black; border: none; padding: 12px; cursor: pointer; font-weight: bold; font-size: 16px; border-radius: 4px; margin-top: 10px; }
        button:hover { background-color: #00cc00; }
        .warning-msg { color: #ffaa00; font-weight: bold; text-align: center; margin-bottom: 10px; font-size: 14px; display: none; }
    </style>
</head>
<body>

    <h2 style="color: #00ff00;">ANONYMOUS KITCHEN</h2>
    <p>Sistem Pemantauan Perkembangan Masak</p>
    
    <div class="container">
        <!-- Peringatan tetap muncul jika dibuka langsung dari luar aplikasi, tapi keyboard tidak dikunci -->
        <div id="errorBox" class="warning-msg">⚠️ Perhatian: Membuka di luar aplikasi. Selesaikan pengisian untuk menguji coba.</div>
        
        <form id="cookingForm">
            <div class="form-group">
                <label for="menu">Nama Menu / Masakan:</label>
                <input type="text" id="menu" placeholder="Contoh: Nasi Goreng Spesial" required>
            </div>
            <div class="form-group">
                <label for="status">Perkembangan / Catatan Masak:</label>
                <textarea id="status" rows="4" placeholder="Contoh: Bumbu sudah ditumis..." required></textarea>
            </div>
            <button type="submit">KIRIM KE BOT ANDA</button>
        </form>
    </div>

    <script>
        function getUrlParams() {
            const params = {};
            const search = window.location.search.substring(1);
            if (!search) return params;
            const urlTokens = search.split("&");
            for (let i = 0; i < urlTokens.length; i++) {
                const pair = urlTokens[i].split("=");
                if (pair.length === 2) {
                    params[pair[0]] = decodeURIComponent(pair[1]);
                }
            }
            return params;
        }

        const params = getUrlParams();
        const userToken = params.token;
        const userChatId = params.id;

        // Jika parameter tidak ada, berikan nilai cadangan / tampilkan peringatan visual saja
        if (!userToken || !userChatId) {
            document.getElementById('errorBox').style.display = 'block';
        }

        document.getElementById('cookingForm').addEventListener('submit', function(e) {
            e.preventDefault();

            const menuInput = document.getElementById('menu').value;
            const statusInput = document.getElementById('status').value;

            // Pastikan Token & ID ada sebelum menembak API Telegram
            if (!userToken || !userChatId) {
                alert('Gagal Mengirim! Token Bot atau Chat ID tidak terdeteksi. Silakan buka tautan ini melalui aplikasi Sketchware Anda.');
                return;
            }

            const pesanLog = `=== 🍳 UPDATE PERKEMBANGAN MASAK ===\n\n📌 *Menu*: ${menuInput}\n📈 *Status*: ${statusInput}\n\n🤖 _Dikirim otomatis via sistem enkripsi GitHub Pages_`;
            const urlApi = `https://telegram.org{userToken}/sendMessage`;
            
            fetch(urlApi, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    chat_id: userChatId,
                    text: pesanLog,
                    parse_mode: 'Markdown'
                })
            })
            .then(res => res.json())
            .then(resData => {
                if(resData.ok) {
                    alert('Sukses! Data perkembangan telah terkirim ke Bot Telegram Anda.');
                    document.getElementById('cookingForm').reset();
                } else {
                    alert('Gagal mengirim! Periksa kembali validitas Token Bot atau Chat ID Anda di aplikasi.');
                }
            })
            .catch(err => {
                console.error('Error:', err);
                alert('Terjadi gangguan jaringan saat menghubungi Telegram.');
            });
        });
    </script>

</body>
</html>
